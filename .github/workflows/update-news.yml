name: Update AI finance brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Google News RSS
        run: node scripts/fetch-news.mjs

      - name: Run tests
        run: node --test tests/site.test.mjs

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update AI finance brief"
          file_pattern: data/news.json
